<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clients — Admin Grand Élysée</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { display:flex; }
    .main-content { flex:1; padding:2rem; overflow-x:hidden; }
    .admin-sidebar { width:230px; min-width:230px; }
    @media(max-width:768px){ .admin-sidebar{ display:none; } }
    .spinner-overlay {
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      background:rgba(0,0,0,0.4); border-radius:4px; z-index:10;
    }
  </style>
</head>
<body>

<aside class="admin-sidebar">
  <div class="sidebar-brand">Grand Élysée</div>
  <a class="sidebar-link" href="dashbord.php"><i class="bi bi-grid-1x2"></i> Tableau de bord</a>
  <a class="sidebar-link" href="admin_reservation.php"><i class="bi bi-calendar-check"></i> Réservations</a>
  <a class="sidebar-link active" href="admin_client.php"><i class="bi bi-people"></i> Clients</a>
  <a class="sidebar-link" href="admin_chambre.php"><i class="bi bi-door-open"></i> Chambres</a>
  <a class="sidebar-link" href="#"><i class="bi bi-bar-chart"></i> Statistiques</a>
</aside>

<div class="main-content">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <p class="section-overline mb-0">Administration</p>
      <h2 style="font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--cream);">
        Gestion des Clients
      </h2>
    </div>
  </div>

  <!-- Filtres -->
  <div style="background:var(--dark2);border:1px solid rgba(201,168,76,0.15);padding:1rem 1.5rem;margin-bottom:1rem;">
    <div class="row g-2 align-items-end">
      <div class="col-md-5">
        <label class="form-label">Rechercher</label>
        <input type="text" id="searchInput" class="form-control"
               placeholder="Nom, email ou téléphone..."/>
      </div>
      <div class="col-md-3">
        <label class="form-label">Trier par</label>
        <select id="sortSelect" class="form-select">
          <option value="nom">Nom</option>
          <option value="nb_sejours">Nombre de séjours</option>
        </select>
      </div>
      <div class="col-md-2">
        <button id="filterBtn" class="btn btn-gold w-100">
          <i class="bi bi-search me-1"></i>Filtrer
        </button>
      </div>
    </div>
  </div>

  <!-- Tableau -->
  <div style="background:var(--dark2);border:1px solid rgba(201,168,76,0.15);padding:1.5rem;position:relative;">
    <div id="loadingOverlay" class="spinner-overlay d-none">
      <div class="spinner-border text-warning" role="status"></div>
    </div>

    <div class="table-responsive">
      <table class="table table-dark-custom mb-0">
        <thead>
          <tr>
            <th>#</th>
            <th>Client</th>
            <th>Email</th>
            <th>Téléphone</th>
            <th>Séjours</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="clientsTableBody">
          <tr>
            <td colspan="6" class="text-center py-4" style="color:var(--muted);">
              Chargement…
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="d-flex justify-content-between align-items-center mt-3"
         style="font-size:0.82rem;color:var(--muted);">
      <span id="paginInfo"></span>
      <div id="paginButtons" class="d-flex gap-1"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
let currentPage = 1;

function initiales(prenom, nom) {
  return ((prenom ?? '?').charAt(0) + (nom ?? '?').charAt(0)).toUpperCase();
}

async function loadClients(page = 1) {
  const search = document.getElementById('searchInput').value.trim();
  const sort   = document.getElementById('sortSelect').value;
  const params = new URLSearchParams({ page, search, sort });

  document.getElementById('loadingOverlay').classList.remove('d-none');

  try {
    const res = await fetch(`get_clients.php?${params}`);

    // ✅ Redirection si session expirée
    if (res.status === 401) {
      window.location.href = 'login.php';
      return;
    }

    // ✅ Vérifier que la réponse est bien du JSON avant de parser
    const contentType = res.headers.get('content-type') ?? '';
    if (!contentType.includes('application/json')) {
      const text = await res.text();
      console.error('Réponse non-JSON reçue :', text);
      document.getElementById('clientsTableBody').innerHTML =
        `<tr><td colspan="6" class="text-center text-danger py-4">
           Erreur serveur — réponse invalide. Voir la console pour les détails.
         </td></tr>`;
      return;
    }

    const data = await res.json();

    if (data.error) {
      document.getElementById('clientsTableBody').innerHTML =
        `<tr><td colspan="6" class="text-center text-danger py-4">${data.error}</td></tr>`;
      return;
    }

    renderTable(data);
    renderPagination(data);
    currentPage = data.page;

  } catch (e) {
    // ✅ Affiche l'erreur réelle dans la console
    console.error('Fetch error:', e);
    document.getElementById('clientsTableBody').innerHTML =
      `<tr><td colspan="6" class="text-center text-danger py-4">
         Erreur de chargement : ${e.message}
       </td></tr>`;
  } finally {
    document.getElementById('loadingOverlay').classList.add('d-none');
  }
}

function renderTable({ clients }) {
  const tbody = document.getElementById('clientsTableBody');

  if (!clients || !clients.length) {
    tbody.innerHTML =
      `<tr><td colspan="6" class="text-center py-4" style="color:var(--muted);">
         Aucun client trouvé.
       </td></tr>`;
    return;
  }

  tbody.innerHTML = clients.map(c => `
    <tr>
      <td style="color:var(--muted);">${c.client_id}</td>
      <td>
        <div class="d-flex align-items-center gap-2">
          <div style="width:32px;height:32px;border-radius:50%;
                      background:rgba(201,168,76,0.15);display:flex;
                      align-items:center;justify-content:center;
                      font-size:0.72rem;color:var(--gold);font-weight:500;">
            ${initiales(c.prenom, c.nom)}
          </div>
          ${c.prenom ?? ''} ${c.nom ?? ''}
        </div>
      </td>
      <td style="color:var(--muted);">${c.email ?? '—'}</td>
      <td style="color:var(--muted);">${c.telephone ?? '—'}</td>
      <td>${c.nb_sejours}</td>
      <td>
        <a href="client_detail.php?id=${c.client_id}" class="btn btn-sm"
           style="border:1px solid rgba(201,168,76,0.3);color:var(--gold);
                  font-size:0.72rem;padding:3px 10px;">
          Voir
        </a>
      </td>
    </tr>
  `).join('');
}

function renderPagination({ page, total_pages, total, offset, par_page }) {
  const from = offset + 1;
  const to   = Math.min(offset + par_page, total);
  document.getElementById('paginInfo').textContent =
    `Affichage ${from}–${to} sur ${total.toLocaleString('fr-FR')} clients`;

  const container = document.getElementById('paginButtons');
  const btnStyle  = active => active
    ? `border:1px solid var(--gold);color:var(--gold);padding:4px 12px;`
    : `border:1px solid rgba(201,168,76,0.2);color:var(--muted);padding:4px 12px;`;

  let html = `<button class="btn btn-sm" ${page<=1?'disabled':''}
                style="${btnStyle(false)}opacity:${page<=1?0.4:1}"
                onclick="loadClients(${page-1})">Préc.</button>`;

  for (let p = Math.max(1, page-2); p <= Math.min(total_pages, page+2); p++) {
    html += `<button class="btn btn-sm" style="${btnStyle(p===page)}"
               onclick="loadClients(${p})">${p}</button>`;
  }

  html += `<button class="btn btn-sm" ${page>=total_pages?'disabled':''}
             style="${btnStyle(false)}opacity:${page>=total_pages?0.4:1}"
             onclick="loadClients(${page+1})">Suiv.</button>`;

  container.innerHTML = html;
}

document.getElementById('filterBtn').addEventListener('click', () => loadClients(1));
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadClients(1);
});

loadClients(1);
</script>
</body>
</html>
